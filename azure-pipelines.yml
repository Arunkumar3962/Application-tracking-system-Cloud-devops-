trigger:
- main

pool:
  name: Devops-agent-pool   # your self-hosted agent pool

steps:
- script: |
    python3 --version
    pip3 install --upgrade pip
    pip3 install -r requirements.txt
  displayName: Install dependencies

- script: |
    pip3 install pytest pytest-azurepipelines
    pytest
  displayName: Run tests
